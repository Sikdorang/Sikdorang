name: FE Lint and Build

on:
  pull_request:
    branches:
      - main

jobs:
  check-fe-changes:
    runs-on: ubuntu-latest
    outputs:
      fe-changed: ${{ steps.changed-files.outputs.any_changed }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Detect FE changes
        id: changed-files
        uses: tj-actions/changed-files@v44
        with:
          files: |
            apps/fe/**/*

      - name: List changed files
        run: echo "::notice title=Changed files::${{ steps.changed-files.outputs.all_changed_files }}"

  lint-and-build:
    name: Lint and Build Frontend
    runs-on: ubuntu-latest
    needs: check-fe-changes # 원래 jobs끼리는 병렬처리하지만 needs에 명시하면 순서가 보장된다.
    if: needs.check-fe-changes.outputs.fe-changed == 'true'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8.6.0

      - name: Cache pnpm modules
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install

      - name: Run Lint
        run: pnpm --filter ./app/fe run lint

      - name: Type Check
        run: pnpm --filter ./app/fe exec tsc --noEmit

      - name: Build Project
        run: pnpm --filter ./app/fe run build
