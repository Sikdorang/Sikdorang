name: FE Lint and Build # workflow 이름

on:
  pull_request:
    branches:
      - main
    paths:
      - 'apps/fe/**' # fe 디렉토리 변경 시에만 작동
      - '.github/workflows/fe-lint-build.yml' # 이 설정 파일 수정 시에도 작동

jobs:
  lint-and-build:
    name: Lint and Build Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository # Github Repository에서 코드를 가져옴
        uses: actions/checkout@v4

      - name: Set up Node.js # Node.js 환경 세팅
        uses: actions/setup-node@v4
        with:
          node-version: 18 # 배포 환경의 Node.js 버전과 동일하게 사용

      - name: Set up pnpm # pnpm 설치
        uses: pnpm/action-setup@v4
        with:
          version: 8.6.0

      - name: Cache pnpm modules # pnpm 캐시 설정
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-

      - name: Install dependencies # 의존성 패키지 설치
        run: pnpm install

      - name: Run Lint # ESLint 실행
        run: pnpm --filter apps/fe run lint
        if: ${{ always() }}

      - name: Type Check # 타입 체크
        run: pnpm --filter apps/fe exec tsc --noEmit
        if: ${{ always() }}

      - name: Build Project # Next.js build 실행
        run: pnpm --filter apps/fe run build
        if: ${{ always() }}
