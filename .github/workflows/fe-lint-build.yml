name: FE Lint and Build

on:
  pull_request:
    branches:
      - main

jobs:
  lint-and-build:
    name: Lint and Build Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Detect Changes in app/fe
        id: changes
        uses: tj-actions/changed-files@v44
        with:
          files: |
            app/fe/**

      - name: Set up Node.js
        if: steps.changes.outputs.any_changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Set up pnpm
        if: steps.changes.outputs.any_changed == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: 8.6.0

      - name: Cache pnpm modules
        if: steps.changes.outputs.any_changed == 'true'
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-

      - name: Install dependencies
        if: steps.changes.outputs.any_changed == 'true'
        run: pnpm install

      - name: Run Lint
        if: steps.changes.outputs.any_changed == 'true'
        run: pnpm --filter ./app/fe run lint

      - name: Type Check
        if: steps.changes.outputs.any_changed == 'true'
        run: pnpm --filter ./app/fe exec tsc --noEmit

      - name: Build Project
        if: steps.changes.outputs.any_changed == 'true'
        run: pnpm --filter ./app/fe run build

      - name: Skip - No FE Changes Detected
        if: steps.changes.outputs.any_changed != 'true'
        run: echo "✅ No changes in app/fe, skipping lint and build."
